steps:
  # Step 1: Build Docker image with buildx for better caching
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/calculatorloop:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/calculatorloop:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/calculatorloop:latest'
      - '.'
    timeout: '3600s'
    id: 'build-image'

  # Step 2: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/calculatorloop:$SHORT_SHA'
    timeout: '1800s'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/calculatorloop:latest'
    timeout: '1800s'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run using gcloud (explicit)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy calculatorloop \
          --image gcr.io/$PROJECT_ID/calculatorloop:$SHORT_SHA \
          --region=asia-south1 \
          --platform=managed \
          --allow-unauthenticated \
          --memory=2Gi \
          --timeout=300s
    timeout: '900s'

images:
  - 'gcr.io/$PROJECT_ID/calculatorloop:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/calculatorloop:latest'

timeout: '3600s'
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substituteOption: 'ALLOW_LOOSE'
